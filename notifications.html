<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Chase x Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>
    <script src="scripts/includes.js"></script>
    <script type="module" src="scripts/config-loader.js"></script>
    <div data-include="partials/header.html"></div>

    <section class="playlist-detail-section">
        <div class="container">
            <a href="profile.html" class="back-btn">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Profile</span>
            </a>

            <div class="playlist-detail-header" style="align-items: flex-start;">
                <div class="playlist-detail-info" style="width: 100%;">
                    <h1 class="playlist-detail-title">Notifications</h1>
                    <p class="playlist-detail-meta" id="notificationsMeta">Loading...</p>
                    <div class="playlist-detail-actions">
                        <button class="btn btn-outline" id="markAllReadBtn" type="button">
                            <i class="fas fa-check"></i> Mark all read
                        </button>
                    </div>
                </div>
            </div>

            <div class="playlist-tracks-container">
                <div class="playlist-tracks-header">
                    <h3>All Notifications</h3>
                    <span class="track-count" id="unreadCount">0 unread</span>
                </div>
                <div class="notifications-viewer" id="notificationsViewer">
                    <div class="notifications-viewer-list">
                        <div class="notifications-list" id="allNotificationsList"></div>
                    </div>
                    <div class="notifications-viewer-detail" id="notificationDetail">
                        <div class="empty-state">
                            <i class="fas fa-bell"></i>
                            <h3>Select a notification</h3>
                            <p>Click a notification on the left to view details here.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <style>
        .notifications-viewer {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 1.5rem;
            align-items: start;
        }

        .notifications-viewer-list {
            min-height: 300px;
        }

        .notifications-viewer-detail {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            min-height: 300px;
            position: sticky;
            top: 110px;
        }

        .notification-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .notification-detail-title {
            font-family: 'Poppins', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0;
        }

        .notification-detail-meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .notification-detail-message {
            color: var(--text-primary);
            line-height: 1.7;
            white-space: pre-wrap;
        }

        .notification-detail-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 1.25rem;
        }

        .notification-item.is-active {
            border-color: var(--primary);
            background: rgba(0, 212, 255, 0.08);
        }

        @media (max-width: 900px) {
            .notifications-viewer {
                grid-template-columns: 1fr;
            }

            .notifications-viewer-detail {
                position: static;
                top: auto;
            }
        }
    </style>

    <div data-include="partials/footer.html"></div>

    <script type="module" src="scripts/firebase-init.js"></script>
    <script type="module" src="scripts/auth.js"></script>
    <script src="scripts/notifications.js"></script>
    <script src="scripts/main.js"></script>
    <script type="module" src="scripts/notifications-page.js"></script>
</body>
</html>
