<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Chase x Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-background">
            <video class="auth-bg-video" autoplay muted playsinline loop>
                <source src="studio-video.mp4" type="video/mp4">
            </video>
            <div class="auth-bg-overlay"></div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <i class="fas fa-music"></i>
                    <span>CHASE X RECORDS</span>
                </a>
                <h2 id="authPageTitle">Sign In</h2>
                <p class="auth-subtitle">Continue where you left off</p>
            </div>

            <div id="authNotification" class="auth-notification"></div>

            <!-- Login Form -->
            <div id="loginContainer" class="auth-form-container">
                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="loginEmail" name="email" required 
                                   placeholder="Enter your email" autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="loginPassword" name="password" required 
                                   placeholder="Enter your password" autocomplete="current-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span>Remember me</span>
                        </label>
                        <button type="button" id="forgotPassword" class="link-btn">Forgot password?</button>
                    </div>

                    <button type="submit" class="btn btn-primary submit-btn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>

                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>

                    <button type="button" id="googleSignIn" class="btn btn-outline google-btn">
                        <i class="fab fa-google"></i> Sign in with Google
                    </button>

                    <p class="auth-switch">
                        Don't have an account? 
                        <button type="button" id="showSignup" class="link-btn">Sign up</button>
                    </p>
                </form>
            </div>

            <!-- Signup Form -->
            <div id="signupContainer" class="auth-form-container" style="display: none;">
                <form id="signupForm" class="auth-form">
                    <div class="form-group">
                        <label for="signupName">Full Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user input-icon"></i>
                            <input type="text" id="signupName" name="name" required 
                                   placeholder="Enter your full name" autocomplete="name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="signupEmail" name="email" required 
                                   placeholder="Enter your email" autocomplete="email">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="signupPassword" name="password" required 
                                   placeholder="Create a password (min 6 characters)" autocomplete="new-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="signupConfirmPassword">Confirm Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="signupConfirmPassword" name="confirmPassword" required 
                                   placeholder="Confirm your password" autocomplete="new-password">
                            <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            <span>I agree to the <a href="#" class="link-btn">Terms of Service</a> and <a href="#" class="link-btn">Privacy Policy</a></span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary submit-btn">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>

                    <div class="auth-divider">
                        <span>or continue with</span>
                    </div>

                    <button type="button" id="googleSignUp" class="btn btn-outline google-btn">
                        <i class="fab fa-google"></i> Sign up with Google
                    </button>

                    <p class="auth-switch">
                        Already have an account? 
                        <button type="button" id="showLogin" class="link-btn">Sign in</button>
                    </p>
                </form>
            </div>

            <div class="auth-footer">
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script type="module" src="scripts/firebase-init.js"></script>
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
