<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listen - Chase XC Records</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .external-player-container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 30px;
      max-width: 900px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .track-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 25px;
    }

    .track-artwork-large {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      overflow: hidden;
      flex-shrink: 0;
      background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(168, 85, 247, 0.2));
    }

    .track-artwork-large img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .track-info-large {
      flex: 1;
    }

    .track-info-large h1 {
      font-size: 1.8rem;
      margin: 0 0 8px 0;
      color: #ffffff;
      font-family: var(--font-heading, system-ui, sans-serif);
    }

    .track-info-large p {
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin: 0;
    }

    .platform-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .platform-badge.spotify {
      background: #1DB954;
      color: white;
    }

    .platform-badge.soundcloud {
      background: #ff5500;
      color: white;
    }

    .platform-badge.youtube {
      background: #ff0000;
      color: white;
    }

    .platform-badge.other {
      background: rgba(0, 212, 255, 0.2);
      color: #00d4ff;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    .player-iframe-container {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      margin-bottom: 25px;
    }

    .player-iframe-container iframe {
      width: 100%;
      height: 352px;
      border: none;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn-external {
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      border: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-external-primary {
      background: linear-gradient(135deg, #00d4ff, #a855f7);
      color: white;
    }

    .btn-external-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
    }

    .btn-external-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .btn-external-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .close-hint {
      text-align: center;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.9rem;
    }

    .close-hint kbd {
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255, 255, 255, 0.7);
    }

    .loading-state i {
      font-size: 3rem;
      margin-bottom: 20px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .external-player-container {
        padding: 20px;
      }

      .track-header {
        flex-direction: column;
        text-align: center;
      }

      .track-artwork-large {
        width: 100px;
        height: 100px;
        margin: 0 auto;
      }

      .track-info-large h1 {
        font-size: 1.4rem;
      }

      .track-info-large p {
        font-size: 1rem;
      }

      .player-iframe-container iframe {
        height: 280px;
      }

      .action-buttons {
        flex-direction: column;
      }

      .btn-external {
        justify-content: center;
      }
    }

    @media (max-width: 480px) {
      .external-player-container {
        padding: 15px;
        border-radius: 16px;
      }

      .track-artwork-large {
        width: 80px;
        height: 80px;
      }

      .track-info-large h1 {
        font-size: 1.2rem;
      }

      .player-iframe-container iframe {
        height: 200px;
      }

      .btn-external {
        padding: 10px 20px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body>
  <div class="external-player-container">
    <div id="loading" class="loading-state">
      <i class="fas fa-spinner"></i>
      <p>Loading player...</p>
    </div>
    
    <div id="player-content" style="display: none;">
      <div class="track-header">
        <div class="track-artwork-large">
          <img id="trackArtwork" src="" alt="Track Artwork">
        </div>
        <div class="track-info-large">
          <h1 id="trackTitle">Track Title</h1>
          <p id="trackArtist">Artist Name</p>
          <span id="platformBadge" class="platform-badge other">External</span>
        </div>
      </div>

      <div class="player-iframe-container">
        <iframe id="playerIframe" src="" allow="autoplay; encrypted-media" frameborder="0"></iframe>
      </div>

      <div class="action-buttons">
        <button id="collapseBtn" class="btn-external btn-external-secondary">
          <i class="fas fa-window-minimize"></i>
          Minimize & Continue Playing
        </button>
        <button id="closeContinueBtn" class="btn-external btn-external-secondary">
          <i class="fas fa-check"></i>
          Close & Continue Playing
        </button>
        <button id="openExternalBtn" class="btn-external btn-external-primary">
          <i class="fas fa-external-link-alt"></i>
          Open in Original Platform
        </button>
        <button id="closeBtn" class="btn-external btn-external-secondary">
          <i class="fas fa-times"></i>
          Stop & Close
        </button>
      </div>

      <p class="close-hint">
        Press <kbd>Esc</kbd> to minimize window
      </p>
    </div>
  </div>

  <script>
    // Get URL parameters
    const params = new URLSearchParams(window.location.search)
    const url = params.get('url')
    const title = params.get('title') || 'Unknown Track'
    const artist = params.get('artist') || 'Unknown Artist'
    const artwork = params.get('artwork') || ''

    // DOM elements
    const loading = document.getElementById('loading')
    const playerContent = document.getElementById('player-content')
    const trackTitle = document.getElementById('trackTitle')
    const trackArtist = document.getElementById('trackArtist')
    const trackArtwork = document.getElementById('trackArtwork')
    const platformBadge = document.getElementById('platformBadge')
    const playerIframe = document.getElementById('playerIframe')
    const openExternalBtn = document.getElementById('openExternalBtn')
    const closeBtn = document.getElementById('closeBtn')

    // Set track info
    trackTitle.textContent = title
    trackArtist.textContent = artist
    if (artwork) {
      trackArtwork.src = artwork
    } else {
      trackArtwork.style.display = 'none'
    }

    // Detect platform and generate embed URL
    function getEmbedUrl(originalUrl) {
      // Spotify
      if (originalUrl.includes('spotify.com')) {
        platformBadge.className = 'platform-badge spotify'
        platformBadge.textContent = 'Spotify'
        
        // Convert to embed URL
        const match = originalUrl.match(/spotify\.com\/(track|album|playlist)\/([a-zA-Z0-9]+)/)
        if (match) {
          const type = match[1]
          const id = match[2]
          return `https://open.spotify.com/embed/${type}/${id}`
        }
      }
      
      // SoundCloud
      else if (originalUrl.includes('soundcloud.com')) {
        platformBadge.className = 'platform-badge soundcloud'
        platformBadge.textContent = 'SoundCloud'
        
        // Use SoundCloud oEmbed
        return `https://w.soundcloud.com/player/?url=${encodeURIComponent(originalUrl)}&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&visual=true`
      }
      
      // YouTube
      else if (originalUrl.includes('youtube.com') || originalUrl.includes('youtu.be')) {
        platformBadge.className = 'platform-badge youtube'
        platformBadge.textContent = 'YouTube'
        
        // Extract video ID
        let videoId = ''
        if (originalUrl.includes('youtu.be')) {
          videoId = originalUrl.split('/').pop().split('?')[0]
        } else {
          const match = originalUrl.match(/[?&]v=([^&]+)/)
          if (match) videoId = match[1]
        }
        
        if (videoId) {
          return `https://www.youtube.com/embed/${videoId}`
        }
      }
      
      // Default/Other
      platformBadge.className = 'platform-badge other'
      platformBadge.textContent = 'External'
      return null
    }

    // Initialize player
    function initPlayer() {
      if (!url) {
        loading.innerHTML = '<p>No URL provided</p>'
        return
      }

      const embedUrl = getEmbedUrl(url)
      
      if (embedUrl) {
        playerIframe.src = embedUrl
        loading.style.display = 'none'
        playerContent.style.display = 'block'
      } else {
        // Can't embed, show direct link option only
        loading.style.display = 'none'
        playerContent.style.display = 'block'
        playerIframe.parentElement.style.display = 'none'
        
        // Update button text
        openExternalBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> Listen on Original Platform'
      }
    }

    // Event listeners
    openExternalBtn.addEventListener('click', () => {
      if (url) {
        window.open(url, '_blank')
      }
    })

    closeBtn.addEventListener('click', () => {
      window.close()
    })

    // Close on Escape key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.close()
      }
    })

    // Initialize
    initPlayer()
  </script>
</body>
</html>
