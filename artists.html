<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artists - Chase x Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <script src="scripts/includes.js"></script>
    <script type="module" src="scripts/config-loader.js"></script>
    <script type="module" src="scripts/notifications.js"></script>
    <div data-include="partials/header.html"></div>

    <!-- Page Header -->
    <section class="hero artists-hero">
        <div class="hero-background"></div>
        <div class="hero-overlay"></div>
        <div class="hero-particles"></div>
        <div class="hero-content">
            <div class="hero-badge">
                <i class="fas fa-music"></i>
                <span>Chase x Records</span>
            </div>
            <h1 class="hero-title">Our Artists</h1>
            <p class="hero-tagline">Discover the talented creators shaping the future of music</p>
            <div class="hero-stats">
                <div class="stat-item">
                    <span class="stat-number" id="artistsCount">--</span>
                    <span class="stat-label">Artists</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="releasesCount">--</span>
                    <span class="stat-label">Releases</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-number" id="streamsCount">--</span>
                    <span class="stat-label">Streams</span>
                </div>
            </div>

            <div class="hero-cta">
                <a href="#featured" class="btn btn-primary">
                    <i class="fas fa-play"></i>
                    Explore Artists
                </a>
                <a href="contact.html" class="btn btn-secondary">
                    <i class="fas fa-envelope"></i>
                    Join Us
                </a>
            </div>
        </div>
        <div class="hero-scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <section class="artists" id="featured">
        <div class="container">
            <h3 class="section-title">Artists</h3>
            <div class="artists-grid" id="artistsGrid"></div>
        </div>
    </section>

    <!-- CTA Section -->
    <section class="about" style="background: var(--background);">
        <div class="container" style="text-align: center;">
            <h3 class="section-title">Want to Join Our Roster?</h3>
            <p style="color: var(--text-secondary); font-size: 1.2rem; margin-bottom: 2rem;">
                We're always looking for talented artists to collaborate with.
            </p>
            <a href="contact.html" class="btn btn-primary">Submit Your Music</a>
        </div>
    </section>

    <div data-include="partials/footer.html"></div>

    <script type="module" src="scripts/firebase-init.js"></script>
    <script type="module" src="scripts/auth.js"></script>
    <script src="scripts/main.js"></script>
    <script type="module" src="scripts/artists-page.js"></script>
</body>
</html>
