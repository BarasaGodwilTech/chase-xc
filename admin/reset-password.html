<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Admin Portal - Chase x Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-compact-disc"></i>
                <h1>Chase x Records</h1>
            </div>
            <h2>Reset Password</h2>
            <p>Enter your email to receive a reset link</p>
        </div>

        <form class="login-form" id="resetPasswordForm">
            <div class="form-group">
                <label for="resetEmail">Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="resetEmail" name="email" required placeholder="Enter your email">
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-login">
                <i class="fas fa-paper-plane"></i> Send Reset Link
            </button>

            <div class="login-footer">
                <p>Remember your password? <a href="index.html">Sign In</a></p>
                <p class="back-to-site"><a href="../index.html">← Back to main site</a></p>
            </div>
        </form>

        <div class="login-background">
            <div class="background-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-circle-notch fa-spin"></i>
            <p id="loadingText">Sending reset link...</p>
        </div>
    </div>

    <script type="module" src="reset-password.js"></script>
    <script type="module" src="../scripts/notifications.js"></script>
</body>
</html>
